<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ATTUNE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400&family=Instrument+Sans:wght@300;400;500&display=swap');
  :root {
    --bg:#0c0c0d; --surface:#141416; --surface2:#1c1c1f;
    --border:#252528; --border2:#2e2e32;
    --text:#e4e0d8; --text-muted:#5a5858; --text-dim:#8a8784;
    --gold:#c9a96e; --gold-soft:rgba(201,169,110,0.10);
    --red:#e05c4b; --red-soft:rgba(224,92,75,0.12); --green:#5db88a;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;overflow:hidden;user-select:none;}
  .app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;}
  .header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
  .logo{font-family:'DM Serif Display',serif;font-size:20px;letter-spacing:0.18em;color:var(--gold);}
  .session-info{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);text-align:right;line-height:1.6;}
  .status-bar{padding:8px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:34px;}
  .status-dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);flex-shrink:0;transition:background 0.3s;}
  .status-dot.recording{background:var(--red);animation:blink 1s infinite;}
  .status-dot.ready{background:var(--green);}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
  .status-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);flex:1;}
  .mic-source{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);}
  .tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
  .tab{flex:1;padding:10px 4px;text-align:center;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold);}
  .tab-panel{display:none;flex:1;overflow-y:auto;scrollbar-width:none;}
  .tab-panel::-webkit-scrollbar{display:none;}
  .tab-panel.active{display:flex;flex-direction:column;}
  .feed{flex:1;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
  .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);text-align:center;padding:40px 24px;gap:12px;}
  .empty-icon{font-size:28px;opacity:0.3;}
  .empty-hint{font-size:13px;line-height:1.7;max-width:220px;}
  .empty-hint span{color:var(--text-dim);}
  .note-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;animation:slideIn 0.3s ease both;}
  @keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .note-card.tap-event{padding:9px 14px;display:flex;align-items:center;gap:10px;}
  .note-card.voice-note{border-left:2px solid var(--gold);}
  .note-card.live-card{border-left:2px solid var(--border2);}
  .badge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:2px 7px;border-radius:20px;flex-shrink:0;}
  .badge-tap{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border2);}
  .badge-voice{background:var(--gold-soft);color:var(--gold);border:1px solid rgba(201,169,110,0.2);}
  .note-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);margin-left:auto;flex-shrink:0;}
  .tap-inline{font-size:13px;color:var(--text-dim);flex:1;}
  .note-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .note-dur{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);}
  .note-text{font-size:13px;line-height:1.65;color:var(--text);font-weight:300;}
  .note-text.dim{color:var(--text-muted);font-style:italic;font-size:12px;}
  .waveform{display:flex;align-items:center;gap:2px;height:22px;margin-bottom:8px;}
  .wave-bar{width:3px;border-radius:2px;background:var(--gold);opacity:0.5;transition:height 0.1s;}
  .audio-player{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:7px 10px;background:var(--surface2);border-radius:8px;border:1px solid var(--border2);}
  .play-btn{width:26px;height:26px;border-radius:50%;border:none;background:var(--gold);color:#0c0c0d;font-size:9px;cursor:pointer;flex-shrink:0;}
  .audio-progress{flex:1;height:3px;background:var(--border2);border-radius:2px;overflow:hidden;}
  .audio-bar{height:100%;width:0%;background:var(--gold);border-radius:2px;transition:width 0.1s linear;}
  .audio-dur-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);flex-shrink:0;}
  .transcript-item{background:var(--surface);border:1px solid var(--border);border-left:2px solid var(--gold);border-radius:12px;padding:12px 14px;animation:slideIn 0.3s ease both;}
  .transcript-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);margin-bottom:8px;display:flex;gap:12px;}
  .transcript-text{font-size:13px;line-height:1.7;color:var(--text);font-weight:300;}
  .transcript-text.empty-t{color:var(--text-muted);font-style:italic;font-size:12px;}
  .stats-section{padding:16px;display:flex;flex-direction:column;gap:12px;}
  .stats-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;}
  .stats-card-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .stat-box{text-align:center;padding:10px;background:var(--surface2);border-radius:8px;}
  .stat-box-val{font-family:'DM Serif Display',serif;font-size:26px;color:var(--text);line-height:1;margin-bottom:4px;}
  .stat-box-val.gold{color:var(--gold);}
  .stat-box-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;}
  .day-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
  .day-row:last-child{border-bottom:none;}
  .day-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);width:72px;flex-shrink:0;}
  .day-bar-wrap{flex:1;height:5px;background:var(--border2);border-radius:3px;overflow:hidden;}
  .day-bar{height:100%;background:var(--gold);border-radius:3px;transition:width 0.6s ease;}
  .day-val{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);width:20px;text-align:right;flex-shrink:0;}
  .bottom-section{flex-shrink:0;border-top:1px solid var(--border);background:var(--bg);}
  .stats-row{display:flex;padding:10px 20px;border-bottom:1px solid var(--border);}
  .stat{flex:1;text-align:center;}
  .stat-value{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);line-height:1;margin-bottom:2px;}
  .stat-value.gold{color:var(--gold);}
  .stat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;}
  .stat-divider{width:1px;background:var(--border);margin:4px 0;}
  .button-area{padding:16px 24px 28px;display:flex;flex-direction:column;align-items:center;gap:12px;}
  .main-btn{width:82px;height:82px;border-radius:50%;border:none;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;transition:transform 0.12s ease,box-shadow 0.2s ease;outline:none;}
  .main-btn::before{content:'';position:absolute;inset:-6px;border-radius:50%;border:1px solid var(--border);transition:border-color 0.3s;}
  .main-btn::after{content:'';position:absolute;inset:-14px;border-radius:50%;border:1px solid var(--border);opacity:0.4;}
  .main-btn.idle{background:var(--surface2);}
  .main-btn.pressed{transform:scale(0.92);}
  .main-btn.recording{background:var(--red-soft);box-shadow:0 0 28px rgba(224,92,75,0.25);}
  .main-btn.recording::before{border-color:var(--red);animation:ring-pulse 1.5s infinite;}
  @keyframes ring-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.06)}}
  .btn-icon{font-size:24px;pointer-events:none;}
  .btn-hint{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:0.06em;text-align:center;line-height:1.8;}
  .rec-timer{font-family:'DM Mono',monospace;font-size:12px;color:var(--red);opacity:0;transition:opacity 0.3s;}
  .rec-timer.visible{opacity:1;}
  .ripple{position:fixed;border-radius:50%;background:rgba(201,169,110,0.15);transform:scale(0);animation:ripple-anim 0.5s ease-out forwards;pointer-events:none;z-index:100;}
  @keyframes ripple-anim{to{transform:scale(4);opacity:0}}
  .toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface2);border:1px solid var(--border2);border-radius:24px;padding:8px 18px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);opacity:0;transition:opacity 0.25s,transform 0.25s;pointer-events:none;white-space:nowrap;z-index:200;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">ATTUNE</div>
    <div class="session-info"><div id="sessionDate">—</div><div id="sessionTime">—</div></div>
  </div>
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text" id="statusText">Готов к работе</div>
    <div class="mic-source" id="micSource">📱</div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('notes',this)">Заметки</div>
    <div class="tab" onclick="switchTab('transcript',this)">Текст</div>
    <div class="tab" onclick="switchTab('stats',this)">Статистика</div>
  </div>

  <div class="tab-panel active" id="tab-notes">
    <div class="feed" id="notesFeed">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">◎</div>
        <div class="empty-hint"><span>Одно нажатие</span> — фиксирует момент<br><span>Двойное нажатие</span> — голосовая заметка</div>
      </div>
    </div>
  </div>

  <div class="tab-panel" id="tab-transcript">
    <div class="feed" id="transcriptFeed">
      <div class="empty-state" id="emptyTranscript">
        <div class="empty-icon">📝</div>
        <div class="empty-hint">Текст голосовых заметок появится здесь</div>
      </div>
    </div>
  </div>

  <div class="tab-panel" id="tab-stats">
    <div class="stats-section">
      <div class="stats-card">
        <div class="stats-card-title">Сегодня</div>
        <div class="stats-grid">
          <div class="stat-box"><div class="stat-box-val" id="statTaps">0</div><div class="stat-box-label">Нажатий</div></div>
          <div class="stat-box"><div class="stat-box-val gold" id="statNotes">0</div><div class="stat-box-label">Заметок</div></div>
          <div class="stat-box"><div class="stat-box-val" id="statSession">0′</div><div class="stat-box-label">Сессия</div></div>
          <div class="stat-box"><div class="stat-box-val" id="statWords">0</div><div class="stat-box-label">Слов</div></div>
        </div>
      </div>
      <div class="stats-card">
        <div class="stats-card-title">Нажатия за неделю</div>
        <div id="weekChart"></div>
      </div>
    </div>
  </div>

  <div class="bottom-section">
    <div class="stats-row">
      <div class="stat"><div class="stat-value" id="tapCount">0</div><div class="stat-label">Нажатий</div></div>
      <div class="stat-divider"></div>
      <div class="stat"><div class="stat-value gold" id="noteCount">0</div><div class="stat-label">Заметок</div></div>
      <div class="stat-divider"></div>
      <div class="stat"><div class="stat-value" id="sessionDuration">0′</div><div class="stat-label">Сессия</div></div>
    </div>
    <div class="button-area">
      <div class="rec-timer" id="recTimer">● 0:00</div>
      <button class="main-btn idle" id="mainBtn"><span class="btn-icon" id="btnIcon">◉</span></button>
      <div class="btn-hint" id="btnHint">1× — заметить · 2× — записать</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
let tapCount=0,noteCount=0,wordCount=0;
let tapTimer=null,tapBuffer=0;
const DBL=320;
let isRecording=false,mediaRecorder=null,audioChunks=[];
let recStartTime=null,recTimerInt=null;
let recognition=null,currentTranscript='';
let sessionStart=Date.now();
let audioCtx=null,currentAudio=null,currentPlayBtn=null;

let weekData=JSON.parse(localStorage.getItem('attune_week')||'{}');
const todayKey=new Date().toISOString().slice(0,10);
if(!weekData[todayKey]) weekData[todayKey]={taps:0,notes:0};

function init(){
  updateClock(); setInterval(updateClock,1000);
  setInterval(()=>{
    const m=Math.floor((Date.now()-sessionStart)/60000);
    document.getElementById('sessionDuration').textContent=m+"'";
    document.getElementById('statSession').textContent=m+"'";
  },30000);
  detectMic(); initSR(); renderWeek();
}

function updateClock(){
  const n=new Date();
  document.getElementById('sessionDate').textContent=n.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
  document.getElementById('sessionTime').textContent=n.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
}

function detectMic(){
  if(!navigator.mediaDevices) return;
  navigator.mediaDevices.enumerateDevices().then(ds=>{
    const h=ds.some(d=>d.kind==='audioinput'&&d.label&&/headset|bluetooth|airpod|earphone|headphone/i.test(d.label));
    document.getElementById('micSource').textContent=h?'🎧 наушники':'📱 телефон';
  }).catch(()=>{});
}

function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

function playBeep(f=880,d=120,t='sine'){
  try{
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type=t;o.frequency.setValueAtTime(f,audioCtx.currentTime);
    g.gain.setValueAtTime(0.3,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d/1000);
    o.start();o.stop(audioCtx.currentTime+d/1000);
  }catch(e){}
}
const playStartBeep=()=>{playBeep(880,100);setTimeout(()=>playBeep(1100,80),110);};
const playStopBeep=()=>{playBeep(660,100);setTimeout(()=>playBeep(440,120),110);};
const playTapBeep=()=>playBeep(600,60);

function initSR(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return;
  function make(){
    const r=new SR();
    r.continuous=false; r.interimResults=true; r.lang='ru-RU'; r.maxAlternatives=1;
    r.onresult=e=>{
      let interim='',final='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal) final+=e.results[i][0].transcript+' ';
        else interim+=e.results[i][0].transcript;
      }
      if(final) currentTranscript+=final;
      updateLive((currentTranscript+interim).trim());
    };
    r.onend=()=>{ if(isRecording){setTimeout(()=>{if(isRecording){recognition=make();try{recognition.start();}catch(e){}}},150);} };
    r.onerror=e=>{ if(isRecording&&e.error!=='not-allowed'){setTimeout(()=>{if(isRecording){recognition=make();try{recognition.start();}catch(e){}}},500);} };
    return r;
  }
  recognition=make();
}

function updateLive(text){
  const c=document.getElementById('live-note-card');
  if(!c) return;
  const t=c.querySelector('.note-text');
  if(t){t.textContent=text||'...слушаю...';t.classList.remove('dim');}
}

const mainBtn=document.getElementById('mainBtn');
mainBtn.addEventListener('click',handleClick);
mainBtn.addEventListener('touchstart',e=>{e.preventDefault();mainBtn.classList.add('pressed');},{passive:false});
mainBtn.addEventListener('touchend',e=>{e.preventDefault();mainBtn.classList.remove('pressed');handleClick(e);},{passive:false});
mainBtn.addEventListener('touchcancel',()=>mainBtn.classList.remove('pressed'));
mainBtn.addEventListener('mouseup',()=>mainBtn.classList.remove('pressed'));

function handleClick(){
  if(isRecording){stopRec();return;}
  tapBuffer++;
  if(tapBuffer===1) tapTimer=setTimeout(()=>{if(tapBuffer===1)onSingle();tapBuffer=0;},DBL);
  else if(tapBuffer===2){clearTimeout(tapTimer);tapBuffer=0;onDouble();}
  ripple();
}

function ripple(){
  const rect=mainBtn.getBoundingClientRect();
  const r=document.createElement('div');
  r.className='ripple';
  r.style.cssText=`width:82px;height:82px;left:${rect.left}px;top:${rect.top}px;`;
  document.body.appendChild(r);setTimeout(()=>r.remove(),600);
}

function onSingle(){
  playTapBeep();tapCount++;
  weekData[todayKey].taps++;saveWeek();
  document.getElementById('tapCount').textContent=tapCount;
  document.getElementById('statTaps').textContent=tapCount;
  const n=new Date();
  const ts=n.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  addTapCard(tapCount,ts);hideEmpty();showToast('Момент зафиксирован');
  setStatus(`Нажатие #${tapCount}`,'ready');setTimeout(()=>setStatus('Готов к работе','default'),2000);
  renderWeek();
}

function onDouble(){startRec();}

async function startRec(){
  if(isRecording) return;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    isRecording=true;currentTranscript='';audioChunks=[];recStartTime=Date.now();
    mainBtn.className='main-btn recording';
    document.getElementById('btnIcon').textContent='■';
    document.getElementById('btnHint').textContent='Нажми чтобы остановить';
    document.getElementById('statusDot').classList.add('recording');
    document.getElementById('recTimer').classList.add('visible');
    setStatus('Запись...','recording');
    playStartBeep();detectMic();hideEmpty();addLiveCard();
    mediaRecorder=new MediaRecorder(stream);
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
    mediaRecorder.onstop=()=>{stream.getTracks().forEach(t=>t.stop());finalizeRec();};
    mediaRecorder.start(100);
    if(recognition) try{recognition.start();}catch(e){}
    recTimerInt=setInterval(updateTimer,500);
  }catch(err){showToast('Нет доступа к микрофону');setStatus('Ошибка микрофона','default');}
}

function stopRec(){
  if(!isRecording) return;
  isRecording=false;playStopBeep();
  if(mediaRecorder&&mediaRecorder.state!=='inactive') mediaRecorder.stop();
  if(recognition) try{recognition.stop();}catch(e){}
  clearInterval(recTimerInt);
  mainBtn.className='main-btn idle';
  document.getElementById('btnIcon').textContent='◉';
  document.getElementById('btnHint').textContent='1× — заметить · 2× — записать';
  document.getElementById('statusDot').classList.remove('recording');
  document.getElementById('recTimer').classList.remove('visible');
  setStatus('Обработка...','default');
}

function updateTimer(){
  const e=Math.floor((Date.now()-recStartTime)/1000);
  document.getElementById('recTimer').textContent=`● ${Math.floor(e/60)}:${(e%60).toString().padStart(2,'0')}`;
}

function finalizeRec(){
  const dur=Math.floor((Date.now()-recStartTime)/1000);
  const durStr=`${Math.floor(dur/60)}:${(dur%60).toString().padStart(2,'0')}`;
  const blob=new Blob(audioChunks,{type:'audio/webm'});
  const url=URL.createObjectURL(blob);
  const transcript=currentTranscript.trim();
  const timeStr=new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  const card=document.getElementById('live-note-card');
  if(card){
    card.id='';card.classList.remove('live-card');card.classList.add('voice-note');
    const waveEl=card.querySelector('.waveform');
    if(waveEl) waveEl.outerHTML=`<div class="audio-player"><button class="play-btn" onclick="togglePlay(this,'${url}')">▶</button><div class="audio-progress"><div class="audio-bar"></div></div><span class="audio-dur-label">${durStr}</span></div>`;
    const durEl=card.querySelector('.note-dur');if(durEl) durEl.textContent=durStr;
    const textEl=card.querySelector('.note-text');
    if(textEl){
      if(transcript){textEl.textContent=transcript;textEl.classList.remove('dim');}
      else{textEl.textContent='🎙 Аудио сохранено · транскрипция недоступна';textEl.classList.add('dim');}
    }
  }
  addTranscript(timeStr,durStr,transcript);
  noteCount++;weekData[todayKey].notes++;
  if(transcript){const wc=transcript.split(/\s+/).filter(Boolean).length;wordCount+=wc;document.getElementById('statWords').textContent=wordCount;}
  saveWeek();
  document.getElementById('noteCount').textContent=noteCount;
  document.getElementById('statNotes').textContent=noteCount;
  renderWeek();setStatus('Заметка сохранена','ready');showToast('Заметка сохранена');
  setTimeout(()=>setStatus('Готов к работе','default'),2500);scrollFeed();
}

function togglePlay(btn,url){
  if(currentAudio&&currentPlayBtn&&currentPlayBtn!==btn){currentAudio.pause();currentAudio.currentTime=0;currentPlayBtn.textContent='▶';currentAudio=null;currentPlayBtn=null;}
  if(!btn._audio){
    btn._audio=new Audio(url);
    btn._audio.onended=()=>{btn.textContent='▶';currentAudio=null;currentPlayBtn=null;};
    btn._audio.ontimeupdate=()=>{const p=(btn._audio.currentTime/btn._audio.duration)*100||0;const b=btn.closest('.audio-player')?.querySelector('.audio-bar');if(b)b.style.width=p+'%';};
  }
  if(btn._audio.paused){btn._audio.play();btn.textContent='⏸';currentAudio=btn._audio;currentPlayBtn=btn;}
  else{btn._audio.pause();btn.textContent='▶';currentAudio=null;currentPlayBtn=null;}
}

function addTapCard(n,ts){
  const f=document.getElementById('notesFeed');
  const c=document.createElement('div');c.className='note-card tap-event';
  c.innerHTML=`<span class="badge badge-tap">Момент</span><span class="tap-inline">Нажатие #${n}</span><span class="note-time">${ts}</span>`;
  f.appendChild(c);scrollFeed();
}

function addLiveCard(){
  const ts=new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  const f=document.getElementById('notesFeed');
  const c=document.createElement('div');c.className='note-card live-card';c.id='live-note-card';
  const bars=Array.from({length:20},()=>`<div class="wave-bar" style="height:${4+Math.random()*16}px"></div>`).join('');
  c.innerHTML=`<div class="note-header"><span class="badge badge-voice">Голос</span><span class="note-dur">—</span><span class="note-time">${ts}</span></div><div class="waveform">${bars}</div><div class="note-text dim">...слушаю...</div>`;
  f.appendChild(c);scrollFeed();
  const wi=setInterval(()=>{if(!isRecording){clearInterval(wi);return;}c.querySelectorAll('.wave-bar').forEach(b=>b.style.height=(4+Math.random()*18)+'px');},120);
}

function addTranscript(ts,dur,text){
  const f=document.getElementById('transcriptFeed');
  const e=document.getElementById('emptyTranscript');if(e)e.remove();
  const item=document.createElement('div');item.className='transcript-item';
  item.innerHTML=`<div class="transcript-meta"><span>${ts}</span><span>${dur}</span></div><div class="transcript-text ${text?'':'empty-t'}">${text||'Транскрипция недоступна — нужен интернет и Chrome'}</div>`;
  f.appendChild(item);
}

function saveWeek(){localStorage.setItem('attune_week',JSON.stringify(weekData));}

function renderWeek(){
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const k=d.toISOString().slice(0,10);
    const label=i===0?'Сегодня':d.toLocaleDateString('ru-RU',{weekday:'short'});
    days.push({label,taps:weekData[k]?.taps||0});
  }
  const max=Math.max(...days.map(d=>d.taps),1);
  document.getElementById('weekChart').innerHTML=days.map(d=>`<div class="day-row"><div class="day-label">${d.label}</div><div class="day-bar-wrap"><div class="day-bar" style="width:${(d.taps/max)*100}%"></div></div><div class="day-val">${d.taps}</div></div>`).join('');
}

function hideEmpty(){const e=document.getElementById('emptyState');if(e)e.style.display='none';}
function scrollFeed(){const f=document.getElementById('notesFeed');setTimeout(()=>f.scrollTop=f.scrollHeight,50);}
function setStatus(text,type){document.getElementById('statusText').textContent=text;const d=document.getElementById('statusDot');d.className='status-dot';if(type==='recording')d.classList.add('recording');if(type==='ready')d.classList.add('ready');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

init();
</script>
